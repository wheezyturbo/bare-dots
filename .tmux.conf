##### Prefix (default, stable everywhere)
set -g prefix C-b
bind C-b send-prefix

##### Terminal + quality-of-life
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g history-limit 200000
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

##### Vim-style behavior
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### Splits in current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Fast pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

##### Quick reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Copy-mode (vim-like)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

##### Session switcher with fzf (optional)
bind C-f run-shell "tmux list-sessions -F '#S' | fzf --height=40% --reverse | xargs -I{} tmux switch-client -t {}"

##### Statusline (rice)
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 140
set -g status-style "fg=#c0caf5,bg=#1a1b26"

# Tokyo-night inspired palette
set -g @thm_bg "#1A1B26"
set -g @thm_bg_alt "#24283B"
set -g @thm_fg "#C0CAF5"
set -g @thm_muted "#565F89"
set -g @thm_blue "#7AA2F7"
set -g @thm_cyan "#7DCFFF"
set -g @thm_green "#9ECE6A"
set -g @thm_orange "#FF9E64"
set -g @thm_red "#F7768E"
set -g @thm_magenta "#BB9AF7"

setw -g window-status-separator " "
setw -g window-status-format "#[fg=#{@thm_fg},bg=#{@thm_bg}]#I:#W"
setw -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_blue},bold] #I:#W "
setw -g window-status-current-style "bold"
setw -g window-status-bell-style "fg=#{@thm_bg},bg=#{@thm_orange},bold"
setw -g window-status-activity-style "fg=#{@thm_bg},bg=#{@thm_green},bold"

set -g pane-border-style "fg=#{@thm_muted}"
set -g pane-active-border-style "fg=#{@thm_blue}"
set -g message-style "fg=#{@thm_bg},bg=#{@thm_cyan},bold"
set -g message-command-style "fg=#{@thm_bg},bg=#{@thm_orange},bold"

set -g status-left "#[fg=#{@thm_bg},bg=#{@thm_blue},bold]  #S #[fg=#{@thm_blue},bg=#{@thm_bg_alt}]#[fg=#{@thm_fg},bg=#{@thm_bg_alt}] #{?client_prefix,PREFIX,TMUX} #[fg=#{@thm_bg_alt},bg=#{@thm_bg}]"
set -g status-right "#[fg=#{@thm_bg},bg=#{@thm_magenta}]  #(basename '#{pane_current_path}') #[fg=#{@thm_magenta},bg=#{@thm_orange}]#[fg=#{@thm_bg},bg=#{@thm_orange}]  #H #[fg=#{@thm_orange},bg=#{@thm_cyan}]#[fg=#{@thm_bg},bg=#{@thm_cyan}] 󰃭 %a %d %b  %H:%M "

##### Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'vi vim nvim emacs man less more tail top htop irssi weechat mutt k9s codex node'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'


# Load TPM only if installed
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'


## Shadows

shadow = true;
shadow-radius = 5;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.6;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'slop'",
  "class_g = 'obs'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@"
];

## Fading

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 10;

## Transparency / Opacity

# Specific rules only. Global transparency is disabled for performance.
opacity-rule = [
    "90:class_g = 'Pcmanfm'",
    "70:class_g = 'Yad'",
];

frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

## Corners

# Keeping corners square (0) requires zero extra masking calculations
corner-radius = 0;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

## General Settings

backend = "glx";
vsync = false;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
unredir-if-possible = true;   # Set to true to bypass compositor for fullscreen games
detect-transient = true;
use-damage = true;            # CRITICAL for performance
xrender-sync-fence = true;    # Improves performance and tearing with GLX
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.90; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

